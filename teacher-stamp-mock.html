<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>先生スタンプ画面モック</title>
    <link rel="stylesheet" href="teacher-stamp-mock.css">
  </head>
  <body>
    <main class="phone-mock" aria-label="先生スタンプ画面モック">
      <header class="screen-header">
        <a class="back-button" href="index.html" aria-label="戻る">‹</a>
        <div>
          <p>先生スタンプ</p>
          <h1>指導の花図鑑</h1>
        </div>
        <span class="header-badge">確認用</span>
      </header>

      <section class="progress-card" aria-label="達成率">
        <div>
          <p>一巡目の輪</p>
          <strong>4 / 5 人</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span></span>
        </div>
        <small>あと1人で冒険者カードに勲章が反映されます</small>
      </section>

      <section class="featured-teacher" aria-label="選択中の先生">
        <div class="teacher-photo-wrap">
          <img src="assets/teacher-koike-soft-bg.png" alt="小池 芳弘 七段">
          <img class="featured-flower" src="assets/sunflower-stamp-stage-05-list.png" alt="">
        </div>
        <div class="featured-copy">
          <p>小池 芳弘 七段</p>
          <h2>ひまわりのスタンプ</h2>
          <div class="stamp-dots" aria-label="4/5 達成">
            <span class="is-filled"></span>
            <span class="is-filled"></span>
            <span class="is-filled"></span>
            <span class="is-filled"></span>
            <span></span>
          </div>
        </div>
      </section>

      <section class="teacher-list" aria-label="先生5人一覧">
        <article class="teacher-row is-complete">
          <img class="row-flower" src="assets/iris-stamp-stage-05-list.png" alt="">
          <div>
            <h3>常石 隆志 六段</h3>
            <p>菖蒲のスタンプ</p>
            <div class="mini-stamps" aria-hidden="true">
              <span class="is-filled"></span><span class="is-filled"></span><span class="is-filled"></span><span></span><span></span>
            </div>
          </div>
          <strong>3/5</strong>
        </article>

        <article class="teacher-row is-complete">
          <img class="row-flower" src="assets/camellia-stamp-stage-05-list.png" alt="">
          <div>
            <h3>結城 聡 九段</h3>
            <p>椿のスタンプ</p>
            <div class="mini-stamps" aria-hidden="true">
              <span class="is-filled"></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <strong>1/5</strong>
        </article>

        <article class="teacher-row is-current">
          <img class="row-flower" src="assets/sunflower-stamp-stage-05-list.png" alt="">
          <div>
            <h3>小池 芳弘 七段</h3>
            <p>ひまわりのスタンプ</p>
            <div class="mini-stamps" aria-hidden="true">
              <span class="is-filled"></span><span class="is-filled"></span><span class="is-filled"></span><span class="is-filled"></span><span></span>
            </div>
          </div>
          <strong>4/5</strong>
        </article>

        <article class="teacher-row is-complete">
          <img class="row-flower" src="assets/hydrangea-stamp-stage-05-list.png" alt="">
          <div>
            <h3>山城 宏 九段</h3>
            <p>紫陽花のスタンプ</p>
            <div class="mini-stamps" aria-hidden="true">
              <span class="is-filled"></span><span class="is-filled"></span><span></span><span></span><span></span>
            </div>
          </div>
          <strong>2/5</strong>
        </article>

        <article class="teacher-row">
          <img class="row-flower" src="assets/sakura-stamp-stage-05-list.png" alt="">
          <div>
            <h3>松本 武久 八段</h3>
            <p>桜のスタンプ</p>
            <div class="mini-stamps" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <strong>0/5</strong>
        </article>
      </section>

      <section class="fairy-card" aria-label="妖精表示">
        <div>
          <p>5回達成で出会える妖精</p>
          <h2>ひまわりの妖精</h2>
          <small>5つ目の花スタンプで達成演出を表示します</small>
        </div>
        <img src="assets/fairy-companion-sunflower-v2.png" alt="ひまわりの妖精">
      </section>
    </main>
  </body>
</html>
