<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>スマホ表示確認</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Yu Gothic", "Hiragino Sans", Meiryo, sans-serif;
        color: #2f2a24;
        background: #f4f0e8;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 18px;
      }

      main {
        display: grid;
        gap: 12px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1rem;
      }

      p {
        color: #6c6258;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .phone {
        width: 390px;
        height: 844px;
        overflow: hidden;
        border: 10px solid #25221f;
        border-radius: 34px;
        background: #fff;
        box-shadow: 0 24px 60px rgba(44, 36, 28, 0.22);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 440px) {
        body {
          padding: 0;
          background: #fff;
        }

        main {
          width: 100vw;
          height: 100vh;
          gap: 0;
        }

        header {
          display: none;
        }

        .phone {
          width: 100vw;
          height: 100vh;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>スマホ表示確認</h1>
          <p>390 × 844px の画面幅で表示しています</p>
        </div>
      </header>
      <section class="phone" aria-label="スマホ表示">
        <iframe src="index.html?preview=shrine-roster-01#admin" title="冒険記録帳 スマホ表示"></iframe>
      </section>
    </main>
  </body>
</html>
