<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>昨日案トップページ確認モック</title>
    <link rel="stylesheet" href="yesterday-style-mock.css">
  </head>
  <body>
    <main class="mock-board" aria-label="昨日案トップページ確認モック">
      <section class="phone-screen top-screen" aria-label="トップページ">
        <div class="hero-map">
          <img src="assets/shonan-watercolor-map.png" alt="">
          <div class="hero-title">
            <h1>水曜会御朱印帳</h1>
            <p>先生とめぐる花図鑑</p>
          </div>
        </div>

        <section class="main-entry">
          <img src="assets/cosmos-stamp-stage-05-v2.png" alt="">
          <div>
            <h2>花図鑑をひらく</h2>
            <p>先生ごとの花スタンプを集めよう</p>
          </div>
          <img class="entry-fairy" src="assets/fairy-apollon-flower-style.png" alt="">
        </section>

        <nav class="home-actions" aria-label="主要メニュー">
          <a href="teacher-stamp-mock.html">
            <img src="assets/teacher-circle-medal-once.png" alt="">
            <span>冒険者カード</span>
          </a>
          <a href="teacher-stamp-mock.html">
            <img src="assets/sakura-stamp-stage-05-list.png" alt="">
            <span>先生一覧</span>
          </a>
          <a href="#titles">
            <img src="assets/medal-stage-04.png" alt="">
            <span>称号</span>
          </a>
        </nav>

        <section class="round-card">
          <div>
            <h2>先生の輪</h2>
            <p>全員1回まであと1人</p>
          </div>
          <img src="assets/teacher-circle-medal-once.png" alt="">
        </section>
      </section>

      <section class="phone-screen card-screen" aria-label="冒険者カード">
        <header class="screen-heading">
          <p>冒険者カード</p>
          <h2>みずの しずく</h2>
        </header>

        <section class="adventurer-card">
          <img class="card-fairy" src="assets/fairy-apollon-flower-style.png" alt="">
          <div>
            <p>今の称号</p>
            <h3>花図鑑の見習い</h3>
            <span>先生の輪 4/5</span>
          </div>
        </section>

        <section class="flower-collection">
          <h3>集めた花</h3>
          <div class="flower-grid">
            <article>
              <img src="assets/cosmos-stamp-stage-05-v2.png" alt="">
              <span>コスモス</span>
            </article>
            <article>
              <img src="assets/camellia-stamp-stage-05-list.png" alt="">
              <span>椿</span>
            </article>
            <article>
              <img src="assets/sunflower-stamp-stage-05-list.png" alt="">
              <span>ひまわり</span>
            </article>
            <article>
              <img src="assets/hydrangea-stamp-stage-05-list.png" alt="">
              <span>紫陽花</span>
            </article>
            <article class="is-next">
              <img src="assets/sakura-stamp-stage-05-list.png" alt="">
              <span>次の花</span>
            </article>
          </div>
        </section>

        <section class="next-goal">
          <h3>次の目標</h3>
          <p>松本先生と対局して、一周目の輪を完成</p>
          <img src="assets/sakura-stamp-stage-05-list.png" alt="">
        </section>
      </section>

      <section class="wide-panel" aria-label="先生スタンプページ一覧">
        <header>
          <p>先生ごとのスタンプページ</p>
          <h2>新テイスト案</h2>
        </header>
        <div class="teacher-strip">
          <article>
            <img class="teacher" src="assets/teacher-photo-1-soft-bg.png" alt="">
            <img class="flower" src="assets/iris-stamp-stage-05-list.png" alt="">
            <h3>常石 隆志 六段</h3>
            <p>菖蒲のスタンプ</p>
          </article>
          <article>
            <img class="teacher" src="assets/teacher-yuki-soft-bg.png" alt="">
            <img class="flower" src="assets/camellia-stamp-stage-05-list.png" alt="">
            <h3>結城 聡 九段</h3>
            <p>椿のスタンプ</p>
          </article>
          <article>
            <img class="teacher" src="assets/teacher-koike-soft-bg.png" alt="">
            <img class="flower" src="assets/sunflower-stamp-stage-05-list.png" alt="">
            <h3>小池 芳弘 七段</h3>
            <p>ひまわりのスタンプ</p>
          </article>
          <article>
            <img class="teacher" src="assets/teacher-yamashiro-soft-bg.png" alt="">
            <img class="flower" src="assets/hydrangea-stamp-stage-05-list.png" alt="">
            <h3>山城 宏 九段</h3>
            <p>紫陽花のスタンプ</p>
          </article>
          <article>
            <img class="teacher" src="assets/teacher-matsumoto-soft-bg.png" alt="">
            <img class="flower" src="assets/sakura-stamp-stage-05-list.png" alt="">
            <h3>松本 武久 八段</h3>
            <p>桜のスタンプ</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
